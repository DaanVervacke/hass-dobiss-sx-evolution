name: Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Lint
        run: ruff check custom_components/ tests/

      - name: Format
        run: ruff format --check custom_components/ tests/

  mypy:
    name: Mypy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Type check
        run: mypy custom_components/dobiss_sx_evolution/
